<body>
<canvas id="starCanvas" style="position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;"></canvas>

<!-- NAV -->

<!-- MAIN -->
<main style="position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:100px clamp(20px,5vw,48px) 60px;">
  <div style="width:100%;max-width:680px;text-align:center;">

    <div style="font-family:'IBM Plex Mono',monospace;font-size:12.5px;letter-spacing:.24em;text-transform:uppercase;color:#22D3EE;display:inline-flex;align-items:center;gap:12px;margin-bottom:40px;">
      <span style="width:8px;height:8px;border-radius:50%;border:1px solid #22D3EE;display:inline-flex;align-items:center;justify-content:center;"><span style="width:3px;height:3px;border-radius:50%;background:#22D3EE;box-shadow:0 0 8px #22D3EE;"></span></span>
      Observatory

      <span style="color:#8C92A2;">Signal lost</span>
    </div>

    <div style="font-family:'Space Grotesk',sans-serif;font-size:clamp(5rem,18vw,11rem);line-height:.9;letter-spacing:-.04em;font-weight:600;background:linear-gradient(180deg,#E7E9F0,#5e94a8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;">404</div>

    <div style="font-family:'IBM Plex Mono',monospace;font-size:clamp(1rem,3.2vw,1.4rem);letter-spacing:.22em;text-transform:uppercase;color:#22D3EE;margin-bottom:26px;">NOT_FOUND</div>

    <p style="font-size:clamp(1.02rem,2vw,1.2rem);line-height:1.55;color:#A6ACBC;max-width:46ch;margin:0 auto 44px;">This neuron isn't on the graph. The resource may have been moved, deleted, or the path mistyped.</p>

    <!-- HUD readout card -->
    <div style="border:1px solid rgba(255,255,255,.12);border-radius:6px;background:#080A10;max-width:440px;margin:0 auto 44px;text-align:left;overflow:hidden;font-family:'IBM Plex Mono',monospace;">
      <div style="display:flex;align-items:center;gap:7px;padding:11px 16px;border-bottom:1px solid rgba(255,255,255,.08);background:#0C0E15;">
        <span style="width:10px;height:10px;border-radius:50%;background:#FB5C57;"></span><span style="width:10px;height:10px;border-radius:50%;background:#FBBE2E;"></span><span style="width:10px;height:10px;border-radius:50%;background:#28C840;"></span>

<script>
(function(){
  // Show the path that was requested
  try{ var p=document.getElementById('reqPath'); if(p) p.textContent=(location.pathname||'/')+(location.search||''); }catch(e){}

  // Starfield
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var canvas=document.getElementById('starCanvas');
  if(!canvas||typeof canvas.getContext!=='function') return;
  var ctx=canvas.getContext('2d');
  var w,h,dpr,stars,raf;
  var COLORS=['rgba(231,233,240,','rgba(34,211,238,','rgba(91,140,255,','rgba(226,85,208,'];
  function build(){
    dpr=Math.min(window.devicePixelRatio||1,2);
    w=canvas.clientWidth; h=canvas.clientHeight;
    canvas.width=Math.floor(w*dpr); canvas.height=Math.floor(h*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
    var count=Math.min(150,Math.floor((w*h)/12000));
    stars=[];
    for(var i=0;i<count;i++){
      var bias=Math.random();
      var color=bias>0.86?COLORS[1+Math.floor(Math.random()*3)]:COLORS[0];
      stars.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.1+0.25,base:Math.random()*0.35+0.12,amp:Math.random()*0.35,sp:Math.random()*0.0007+0.0002,ph:Math.random()*Math.PI*2,color:color});
    }
  }
  function draw(t){
    ctx.clearRect(0,0,w,h);
    for(var i=0;i<stars.length;i++){
      var s=stars[i];
      var tw=reduce?s.base:s.base+s.amp*(0.5+0.5*Math.sin(t*s.sp+s.ph));
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=s.color+Math.max(0,Math.min(1,tw)).toFixed(3)+')'; ctx.fill();
    }
    raf=requestAnimationFrame(draw);
  }
  window.addEventListener('resize', build);
  build();
  if(reduce){ draw(0); if(raf) cancelAnimationFrame(raf); } else { raf=requestAnimationFrame(draw); }
})();
</script>
</body>
